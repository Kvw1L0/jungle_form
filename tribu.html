<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jungle | El Muro de la Tribu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: url('fondo.png') no-repeat center center fixed;
            background-size: cover;
            background-color: #050505; /* Fondo oscuro por si no carga la imagen */
            overflow: hidden; /* Evita barras de scroll */
            font-family: 'Arial Black', sans-serif;
        }

        /* Capa oscura para que resalten los colores neón */
        .overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.85); 
            z-index: 1;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 2;
            display: block;
        }

        .hud {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 3;
            color: #FFE000;
            text-transform: uppercase;
            letter-spacing: 2px;
            pointer-events: none;
        }
        
        .hud h1 { font-size: 1.5rem; text-shadow: 0 0 10px rgba(255, 224, 0, 0.5); }
        .hud p { font-size: 0.8rem; color: #00E676; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="overlay"></div>
    
    <div class="hud">
        <h1>TRIBU JUNGLE</h1>
        <p id="counter">Monitores Activos: 0</p>
    </div>

    <canvas id="universo-canvas"></canvas>

    <script>
        const canvas = document.getElementById('universo-canvas');
        const ctx = canvas.getContext('2d');

        // Ajustar el canvas al tamaño de la pantalla
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // Colores oficiales de la Tribu
        const partConfigs = { 
            head: { color: '#FF9800' },   // Naranjo
            body: { color: '#00E676' },   // Verde
            limbs: { color: '#9C27B0' }   // Morado
        };

        // --- CLASE: MIEMBRO DE LA TRIBU ---
        class MiembroTribu {
            constructor(strokes) {
                this.strokes = strokes;
                
                // Posición inicial aleatoria
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                
                // Velocidad de flotación (Direcciones aleatorias)
                this.vx = (Math.random() - 0.5) * 2; 
                this.vy = (Math.random() - 0.5) * 2;
                
                // Escala (Profundidad: unos más cerca, otros más lejos)
                this.scale = Math.random() * 0.4 + 0.2; // Entre 0.2x y 0.6x del tamaño original
                
                // Desfase para que no todos muevan los brazos al mismo tiempo
                this.phaseOffset = Math.random() * Math.PI * 2;
            }

            actualizar() {
                // 1. Movimiento en el espacio
                this.x += this.vx;
                this.y += this.vy;

                // 2. Efecto Pac-Man (Si sale de la pantalla, entra por el otro lado)
                const margen = 150; // Para que no desaparezca de golpe
                if (this.x > canvas.width + margen) this.x = -margen;
                if (this.x < -margen) this.x = canvas.width + margen;
                if (this.y > canvas.height + margen) this.y = -margen;
                if (this.y < -margen) this.y = canvas.height + margen;
            }

            dibujar(tiempo) {
                ctx.save();
                // Nos trasladamos a la posición del miembro y aplicamos su escala
                ctx.translate(this.x, this.y);
                ctx.scale(this.scale, this.scale);
                
                ctx.lineWidth = 6; // Trazo más grueso para la pantalla grande
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';

                // Animaciones locales (con su desfase único)
                const animHead = Math.sin(tiempo / 300 + this.phaseOffset) * 15;
                const animBody = Math.sin(tiempo / 200 + this.phaseOffset) * 5;
                const animLimbs = Math.sin(tiempo / 150 + this.phaseOffset) * 25;

                // Dibujar Cabeza
                ctx.strokeStyle = partConfigs.head.color;
                this.dibujarZonas(this.strokes.head, animHead, 0);

                // Dibujar Tronco
                ctx.strokeStyle = partConfigs.body.color;
                this.dibujarZonas(this.strokes.body, 0, animBody);

                // Dibujar Extremidades
                ctx.strokeStyle = partConfigs.limbs.color;
                this.dibujarZonas(this.strokes.limbs, 0, animLimbs);

                ctx.restore();
            }

            dibujarZonas(partStrokes, offsetX, offsetY) {
                if (!partStrokes) return;
                partStrokes.forEach(stroke => {
                    if (stroke.length < 2) return;
                    ctx.beginPath();
                    // Centramos el dibujo restando ~150px (mitad del canvas del Batiphone)
                    ctx.moveTo(stroke[0].x - 150 + offsetX, stroke[0].y - 100 + offsetY);
                    for (let i = 1; i < stroke.length; i++) {
                        ctx.lineTo(stroke[i].x - 150 + offsetX, stroke[i].y - 100 + offsetY);
                    }
                    ctx.stroke();
                });
            }
        }

        // --- EL UNIVERSO ---
        const tribuActiva = [];

        // Función auxiliar para crear "Trazos falsos" de prueba
        function generarDibujoPrueba() {
            const cx = 150, cy = 100;
            return {
                head: [ [ {x: cx-20, y: cy-50}, {x: cx+20, y: cy-50}, {x: cx+20, y: cy-10}, {x: cx-20, y: cy-10}, {x: cx-20, y: cy-50} ] ],
                body: [ [ {x: cx, y: cy-10}, {x: cx, y: cy+60} ] ],
                limbs: [ 
                    [ {x: cx, y: cy}, {x: cx-40, y: cy+20} ], // Brazo izq
                    [ {x: cx, y: cy}, {x: cx+40, y: cy+20} ], // Brazo der
                    [ {x: cx, y: cy+60}, {x: cx-30, y: cy+120} ], // Pierna izq
                    [ {x: cx, y: cy+60}, {x: cx+30, y: cy+120} ]  // Pierna der
                ]
            };
        }

        // Inicializar con 25 monitores flotantes
        for (let i = 0; i < 25; i++) {
            tribuActiva.push(new MiembroTribu(generarDibujoPrueba()));
        }
        document.getElementById('counter').innerText = `Monitores Activos: ${tribuActiva.length}`;

        // Motor de renderizado
        function animar(tiempo) {
            // Limpiar frame anterior (se puede poner rgba con opacidad para efecto de rastro)
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Actualizar y dibujar cada miembro
            tribuActiva.forEach(miembro => {
                miembro.actualizar();
                miembro.dibujar(tiempo);
            });

            requestAnimationFrame(animar);
        }

        // Iniciar el universo
        requestAnimationFrame(animar);

    </script>
</body>
</html>
